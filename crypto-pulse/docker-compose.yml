services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - crypto-net

  kafka:
    image: confluentinc/cp-kafka:7.0.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - crypto-net

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.0.0
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: >
      bash -c "
        echo -e 'Waiting for Kafka to be ready...' &&
        cub kafka-ready -b kafka:29092 1 40 &&
        echo -e 'Creating topics...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic crypto.realtime.prices &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic crypto.market.data &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic crypto.news &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic crypto.social &&
        echo -e 'Topics created successfully'
      "
    networks:
      - crypto-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - crypto-net

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: cryptopulse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - crypto-net

  airflow-webserver:
    image: apache/airflow:2.7.3
    container_name: airflow-webserver
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/cryptopulse
      AIRFLOW__WEBSERVER__RBAC: 'True'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      _PIP_ADDITIONAL_REQUIREMENTS: 'pyspark==3.5.0 delta-spark==3.2.0 requests python-dotenv dbt-core==1.7.0 dbt-postgres==1.7.0'
    command: webserver
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./processing/spark_jobs:/opt/airflow/jobs
      - ./ingestion:/opt/airflow/ingestion
      - ./data:/opt/data
      - ./processing/dbt:/opt/airflow/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - crypto-net

  airflow-scheduler:
    image: apache/airflow:2.7.3
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-webserver
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/cryptopulse
      _PIP_ADDITIONAL_REQUIREMENTS: 'pyspark==3.5.0 delta-spark==3.2.0 requests python-dotenv dbt-core==1.7.0 dbt-postgres==1.7.0'
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ./processing/spark_jobs:/opt/airflow/jobs
      - ./ingestion:/opt/airflow/ingestion
      - ./data:/opt/data
      - ./processing/dbt:/opt/airflow/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - crypto-net

  spark-master:
    build:
      context: ./spark-apps
      dockerfile: Dockerfile.spark
    image: crypto-pulse-spark:3.5.0
    container_name: spark-master
    depends_on:
      - kafka
    env_file:
      - .env
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    networks:
      - crypto-net

  spark-worker:
    image: crypto-pulse-spark:3.5.0
    container_name: spark-worker
    depends_on:
      - spark-master
    env_file:
      - .env
    environment:
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 2
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8083:8081"
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    networks:
      - crypto-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      - postgres
      - kafka
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    environment:
      - POSTGRES_HOST=postgres
    networks:
      - crypto-net

  streaming-bronze-prices:
    image: crypto-pulse-spark:3.5.0
    container_name: streaming-bronze-prices
    depends_on:
      - spark-worker
      - kafka
    env_file:
      - .env
    volumes:
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    command: >
      /opt/spark/bin/spark-submit 
      --master spark://spark-master:7077 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-azure:3.3.4,org.wildfly.openssl:wildfly-openssl:1.1.3.Final 
      /opt/spark/jobs/bronze_consumer.py
    networks:
      - crypto-net

  streaming-bronze-news:
    image: crypto-pulse-spark:3.5.0
    container_name: streaming-bronze-news
    depends_on:
      - spark-worker
      - kafka
    env_file:
      - .env
    volumes:
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    command: >
      /opt/spark/bin/spark-submit 
      --master spark://spark-master:7077 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-azure:3.3.4,org.wildfly.openssl:wildfly-openssl:1.1.3.Final 
      /opt/spark/jobs/bronze_news_consumer.py
    networks:
      - crypto-net

  streaming-bronze-social:
    image: crypto-pulse-spark:3.5.0
    container_name: streaming-bronze-social
    depends_on:
      - spark-worker
      - kafka
    env_file:
      - .env
    volumes:
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    command: >
      /opt/spark/bin/spark-submit 
      --master spark://spark-master:7077 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-azure:3.3.4,org.wildfly.openssl:wildfly-openssl:1.1.3.Final 
      /opt/spark/jobs/bronze_social_consumer.py
    networks:
      - crypto-net

  streaming-silver-prices:
    image: crypto-pulse-spark:3.5.0
    container_name: streaming-silver-prices
    depends_on:
      - spark-worker
    env_file:
      - .env
    volumes:
      - ./processing/spark_jobs:/opt/spark/jobs
      - ./data:/opt/data
    command: >
      /opt/spark/bin/spark-submit 
      --master spark://spark-master:7077 
      --packages io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-azure:3.3.4,org.wildfly.openssl:wildfly-openssl:1.1.3.Final 
      /opt/spark/jobs/silver_prices_processor.py
    networks:
      - crypto-net

networks:
  crypto-net:
    driver: bridge

volumes:
  postgres_data:
  airflow_logs:
